<!DOCTYPE html>
<html lang="en">
<head>
<script src="../data/habits-data.js" onerror="console.log('No habits-data.js yet')"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habits â€” Chief of Staff</title>
<style>
  :root {
    --ink: #0a0a0a;
    --ink-2: #1a1a1a;
    --ink-3: #2a2a2a;
    --text: #e8e8e6;
    --text-2: #a6a6a4;
    --text-3: #6e6e6c;
    --accent: #ff8c42;
    --accent-2: #ffa76a;
    --green: #43d67d;
    --red: #ff5e5e;
    --amber: #ffb547;
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.16);
    --mono: "SFMono-Regular", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--ink);
    color: var(--text);
    padding: 32px 24px 80px;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .header-title {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-3);
  }
  .source-notice {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
    padding: 8px 12px;
    background: var(--ink-2);
    border-radius: 6px;
    margin-bottom: 24px;
    border-left: 3px solid var(--accent);
  }
  .source-notice.error { border-left-color: var(--red); color: var(--text-2); }
  .source-notice code {
    background: var(--ink-3);
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 10px;
  }
  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-3);
    margin-bottom: 16px;
  }
  .habits-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 20px;
    margin-bottom: 48px;
  }
  .habit-card {
    background: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px 20px;
    text-align: center;
    position: relative;
    transition: all 0.2s ease;
    cursor: pointer;
  }
  .habit-card:hover {
    border-color: var(--border-strong);
    transform: translateY(-2px);
  }
  .habit-card.done {
    background: linear-gradient(180deg, rgba(67,214,125,0.08), var(--ink-2));
    border-color: rgba(67,214,125,0.3);
  }
  .habit-icon { font-size: 32px; margin-bottom: 12px; }
  .habit-name {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .ring-container {
    position: relative;
    width: 110px;
    height: 110px;
    margin: 0 auto 16px;
  }
  .ring-svg { transform: rotate(-90deg); }
  .ring-bg { stroke: var(--ink-3); }
  .ring-fg {
    stroke: var(--accent);
    transition: stroke-dashoffset 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .habit-card.done .ring-fg { stroke: var(--green); }
  .ring-label {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--mono);
    font-size: 18px;
    font-weight: 700;
  }
  .ring-label-sub {
    font-size: 10px;
    color: var(--text-3);
    display: block;
    margin-top: 2px;
  }
  .habit-streak {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 12px;
  }
  .habit-streak strong { color: var(--amber); }
  .habit-btn {
    width: 100%;
    background: var(--ink-3);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .habit-btn:hover { background: var(--accent); color: var(--ink); border-color: var(--accent); }
  .habit-card.done .habit-btn {
    background: rgba(67,214,125,0.15);
    color: var(--green);
    border-color: rgba(67,214,125,0.3);
  }
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 48px;
  }
  .stat-card {
    background: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-3);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--mono);
    font-size: 28px;
    font-weight: 700;
  }
  .stat-sub {
    font-size: 12px;
    color: var(--text-2);
    margin-top: 4px;
  }
  .activity-list {
    background: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 0;
  }
  .activity-item {
    display: grid;
    grid-template-columns: 100px 1fr auto;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-date {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-3);
  }
  .activity-habit { font-weight: 500; }
  .activity-icon { font-size: 18px; }
  .log-form {
    background: var(--ink-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 32px;
  }
  .log-form-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .log-form-buttons {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .log-form-button {
    padding: 10px 16px;
    background: var(--ink-3);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .log-form-button:hover { background: var(--accent); color: var(--ink); }
  .empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-3);
    font-style: italic;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <div class="header-title">Habits</div>
      <div class="header-sub" id="current-date">â€”</div>
    </div>
    <div class="header-sub">Chief of Staff</div>
  </div>

  <div id="source-notice" class="source-notice">Loadingâ€¦</div>

  <!-- Quick log section -->
  <div class="log-form" id="log-form" style="display:none;">
    <div class="log-form-title">Quick log</div>
    <div class="log-form-buttons" id="log-buttons"></div>
  </div>

  <!-- Summary stats -->
  <div class="summary-grid" id="summary-grid" style="display:none;">
    <div class="stat-card">
      <div class="stat-label">Today</div>
      <div class="stat-value" id="stat-today">0<span style="font-size: 16px; color: var(--text-3);">/5</span></div>
      <div class="stat-sub" id="stat-today-sub">habits logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This week</div>
      <div class="stat-value" id="stat-week">0</div>
      <div class="stat-sub">total logs</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">On track</div>
      <div class="stat-value" id="stat-ontrack">0<span style="font-size: 16px; color: var(--text-3);">/5</span></div>
      <div class="stat-sub">habits meeting target</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Best streak</div>
      <div class="stat-value" id="stat-streak">0</div>
      <div class="stat-sub" id="stat-streak-sub">days</div>
    </div>
  </div>

  <!-- Habit rings -->
  <div class="section-title" id="rings-title" style="display:none;">Today's habits</div>
  <div class="habits-grid" id="habits-grid" style="display:none;"></div>

  <!-- Recent activity -->
  <div class="section-title" id="activity-title" style="display:none;">Recent activity</div>
  <div class="activity-list" id="activity-list" style="display:none;"></div>

  <div class="empty" id="empty" style="display:none;">
    No logs yet. Log your first habit via the button above or run:<br>
    <code style="font-family: var(--mono); font-size: 12px; background: var(--ink-2); padding: 4px 8px; border-radius: 4px; display: inline-block; margin-top: 8px;">python handler.py log gym</code>
  </div>
</div>

<script>
const state = { data: null, loaded: false };

function loadData() {
  const notice = document.getElementById("source-notice");

  if (window.HABITS_DATA) {
    state.data = window.HABITS_DATA;
    state.loaded = true;
    const n = state.data.logs ? state.data.logs.length : 0;
    notice.innerHTML = `Loaded ${n} logs from <code>../data/habits-data.js</code>`;
    renderAll();
    return;
  }

  // localStorage fallback
  try {
    const local = localStorage.getItem("habits-logs");
    if (local) {
      state.data = JSON.parse(local);
      state.loaded = true;
      notice.innerHTML = `Using browser localStorage. Log via Python CLI and refresh to sync from disk.`;
      renderAll();
      return;
    }
  } catch (e) {}

  state.loaded = true;
  notice.classList.add("error");
  notice.innerHTML = `No logs yet. Run <code>python handler.py log gym</code> to start, then refresh.`;
  document.getElementById("empty").style.display = "block";
}

function renderAll() {
  if (!state.data || !state.data.habits) return;

  const today = new Date();
  document.getElementById("current-date").textContent =
    today.toLocaleDateString("en-US", { weekday: "long", year: "numeric", month: "long", day: "numeric" });

  renderHabits();
  renderSummary();
  renderActivity();
  renderLogForm();
}

function renderHabits() {
  const grid = document.getElementById("habits-grid");
  const title = document.getElementById("rings-title");
  grid.innerHTML = "";
  grid.style.display = "grid";
  title.style.display = "block";

  const todayLogged = new Set((state.data.today && state.data.today.logged) || []);
  const habits = (state.data.week && state.data.week.habits) || [];

  habits.forEach((h, i) => {
    const isDone = todayLogged.has(h.id);
    const pct = Math.min(100, (h.count_this_week / h.target_per_week) * 100);
    const circumference = 2 * Math.PI * 48;
    const offset = circumference * (1 - pct / 100);

    const card = document.createElement("div");
    card.className = "habit-card fade-in" + (isDone ? " done" : "");
    card.style.animationDelay = (i * 80) + "ms";
    card.innerHTML = `
      <div class="habit-icon">${h.icon}</div>
      <div class="habit-name">${h.name}</div>
      <div class="ring-container">
        <svg class="ring-svg" width="110" height="110" viewBox="0 0 110 110">
          <circle class="ring-bg" cx="55" cy="55" r="48" fill="none" stroke-width="8"></circle>
          <circle class="ring-fg" cx="55" cy="55" r="48" fill="none" stroke-width="8"
            stroke-linecap="round"
            stroke-dasharray="${circumference}"
            stroke-dashoffset="${offset}"></circle>
        </svg>
        <div class="ring-label">${h.count_this_week}<span class="ring-label-sub">of ${h.target_per_week}</span></div>
      </div>
      <div class="habit-streak">ðŸ”¥ <strong>${h.streak}</strong> ${h.target_per_week === 7 ? 'day' : 'week'}${h.streak !== 1 ? 's' : ''} streak</div>
      <button class="habit-btn" data-habit="${h.id}">
        ${isDone ? "âœ“ Logged today" : "Log today"}
      </button>
    `;
    grid.appendChild(card);
  });
}

function renderSummary() {
  const today = (state.data.today && state.data.today.logged_count) || 0;
  const habits = (state.data.week && state.data.week.habits) || [];
  const weekTotal = habits.reduce((s, h) => s + (h.count_this_week || 0), 0);
  const onTrack = habits.filter(h => h.on_track).length;
  const bestStreak = Math.max(0, ...habits.map(h => h.streak || 0));
  const bestHabit = habits.find(h => h.streak === bestStreak);

  animateNumber("stat-today", today, 5);
  animateNumber("stat-week", weekTotal);
  animateNumber("stat-ontrack", onTrack, 5);
  animateNumber("stat-streak", bestStreak);
  document.getElementById("stat-streak-sub").textContent =
    bestHabit ? `${bestStreak > 0 ? bestHabit.name : 'â€”'}` : "no logs";
  document.getElementById("summary-grid").style.display = "grid";
}

function renderActivity() {
  const list = document.getElementById("activity-list");
  const title = document.getElementById("activity-title");
  list.innerHTML = "";
  const logs = (state.data.logs || []).slice(0, 12);
  if (logs.length === 0) return;

  logs.forEach((logEntry, i) => {
    const habit = (state.data.habits || []).find(h => h.id === logEntry.habit_id) || {};
    const item = document.createElement("div");
    item.className = "activity-item fade-in";
    item.style.animationDelay = (i * 40) + "ms";
    const dateStr = formatDate(logEntry.logged_date);
    item.innerHTML = `
      <div class="activity-date">${dateStr}</div>
      <div class="activity-habit">${habit.name || logEntry.habit_id}</div>
      <div class="activity-icon">${habit.icon || "Â·"}</div>
    `;
    list.appendChild(item);
  });
  list.style.display = "block";
  title.style.display = "block";
}

function renderLogForm() {
  const buttons = document.getElementById("log-buttons");
  const habits = state.data.habits || [];
  const todayLogged = new Set((state.data.today && state.data.today.logged) || []);
  buttons.innerHTML = "";
  habits.forEach(h => {
    const b = document.createElement("button");
    b.className = "log-form-button";
    b.innerHTML = `${h.icon} ${h.name}`;
    b.style.opacity = todayLogged.has(h.id) ? "0.4" : "1";
    b.disabled = todayLogged.has(h.id);
    b.onclick = () => logToLocalStorage(h.id);
    buttons.appendChild(b);
  });
  document.getElementById("log-form").style.display = "block";
}

function logToLocalStorage(habitId) {
  const today = new Date().toISOString().split("T")[0];
  const existing = state.data || { logs: [], habits: (window.HABITS_DATA || {}).habits || [] };
  const already = (existing.logs || []).some(l => l.habit_id === habitId && l.logged_date === today);
  if (already) { alert("Already logged today"); return; }
  existing.logs = existing.logs || [];
  existing.logs.unshift({ habit_id: habitId, logged_date: today, logged_at: new Date().toISOString(), note: "" });
  // Rebuild today + week
  rebuildDerivedState(existing);
  localStorage.setItem("habits-logs", JSON.stringify(existing));
  state.data = existing;
  renderAll();
}

function rebuildDerivedState(data) {
  const today = new Date().toISOString().split("T")[0];
  const logs = data.logs || [];
  const loggedToday = [...new Set(logs.filter(l => l.logged_date === today).map(l => l.habit_id))];
  const allIds = (data.habits || []).map(h => h.id);
  data.today = {
    date: today,
    logged: loggedToday,
    pending: allIds.filter(i => !loggedToday.includes(i)),
    pending_names: (data.habits || []).filter(h => !loggedToday.includes(h.id)).map(h => h.name),
    logged_count: loggedToday.length,
    total: allIds.length,
  };
  const weekStart = weekStartDate(new Date());
  const weekStartStr = weekStart.toISOString().split("T")[0];
  data.week = { habits: (data.habits || []).map(h => {
    const count = logs.filter(l => l.habit_id === h.id && l.logged_date >= weekStartStr).length;
    return { ...h, count_this_week: count, streak: 0, on_track: count >= h.target_per_week };
  }) };
}

function weekStartDate(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = dt.getDate() - (day === 0 ? 6 : day - 1);
  dt.setDate(diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function animateNumber(id, target, max) {
  const el = document.getElementById(id);
  const current = parseInt(el.textContent) || 0;
  const duration = 500;
  const start = performance.now();
  function step(now) {
    const progress = Math.min(1, (now - start) / duration);
    const value = Math.round(current + (target - current) * easeOut(progress));
    el.innerHTML = max ? `${value}<span style="font-size: 16px; color: var(--text-3);">/${max}</span>` : `${value}`;
    if (progress < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

function formatDate(iso) {
  const d = new Date(iso + "T00:00:00");
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "Today";
  if (diff === 1) return "Yesterday";
  if (diff < 7) return `${diff}d ago`;
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}

// Event delegation for habit cards
document.addEventListener("click", (e) => {
  const btn = e.target.closest(".habit-btn[data-habit]");
  if (btn && !btn.disabled) {
    logToLocalStorage(btn.dataset.habit);
  }
});

loadData();
</script>
</body>
</html>
